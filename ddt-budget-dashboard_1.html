<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDT Budget Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --surface3: #1e1e28;
    --border: #2a2a38;
    --border2: #333345;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a70;
    --accent: #c8ff4e;
    --accent2: #7c4dff;
    --green: #4eff9e;
    --amber: #ffa940;
    --red: #ff4e6a;
    --blue: #4eb8ff;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    z-index: 1000;
    transition: opacity 0.4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-logo {
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--accent);
  }
  .loader-bar {
    width: 200px; height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-bar-inner {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 2px;
  }
  .loader-text { color: var(--text3); font-size: 11px; letter-spacing: 0.08em; }

  /* ── LAYOUT ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .header-divider { width: 1px; height: 20px; background: var(--border2); }
  .header-title { color: var(--text2); font-size: 12px; letter-spacing: 0.06em; }

  nav {
    display: flex; gap: 4px;
  }
  .nav-btn {
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .nav-btn:hover { color: var(--text); border-color: var(--border2); }
  .nav-btn.active {
    background: var(--surface3);
    border-color: var(--border2);
    color: var(--accent);
  }

  .page { display: none; padding: 28px; max-width: 1400px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── KPI CARDS ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi-row-6 { grid-template-columns: repeat(6, 1fr); }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--border2);
  }
  .kpi-card.accent::before { background: var(--accent); }
  .kpi-card.green::before { background: var(--green); }
  .kpi-card.amber::before { background: var(--amber); }
  .kpi-card.red::before { background: var(--red); }

  .kpi-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-family: var(--sans);
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .kpi-value.green { color: var(--green); }
  .kpi-value.amber { color: var(--amber); }
  .kpi-value.red { color: var(--red); }
  .kpi-sub {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    margin-top: 28px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── TABLES ── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .data-table th {
    padding: 10px 14px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }
  .data-table th.right { text-align: right; }
  .data-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); }
  .data-table td.right { text-align: right; font-variant-numeric: tabular-nums; }
  .data-table td.mono { font-family: var(--mono); }

  /* ── STATUS PILLS ── */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .pill.green { background: rgba(78,255,158,0.12); color: var(--green); }
  .pill.amber { background: rgba(255,169,64,0.12); color: var(--amber); }
  .pill.red { background: rgba(255,78,106,0.12); color: var(--red); }
  .pill.gray { background: rgba(90,90,112,0.2); color: var(--text3); }
  .pill::before { content: '●'; font-size: 7px; }

  /* ── INSIGHT BANNER ── */
  .insight-banner {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
  }
  .insight-banner.on-target { border-left-color: var(--green); }
  .insight-banner.below { border-left-color: var(--amber); }
  .insight-banner.significantly-below { border-left-color: var(--red); }
  .insight-banner strong { color: var(--text); }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    display: flex; align-items: center; justify-content: space-between;
  }

  /* ── P&L WATERFALL ── */
  .pnl-table { width: 100%; border-collapse: collapse; }
  .pnl-table td {
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .pnl-table tr:last-child td { border-bottom: none; }
  .pnl-table .pnl-label { color: var(--text2); }
  .pnl-table .pnl-indent { color: var(--text3); padding-left: 32px; font-size: 11px; }
  .pnl-table .pnl-pct { color: var(--text3); text-align: right; font-size: 11px; }
  .pnl-table .pnl-amount { text-align: right; font-variant-numeric: tabular-nums; }
  .pnl-table .pnl-total { font-family: var(--sans); font-weight: 600; }
  .pnl-table .pnl-total td { background: var(--surface2); color: var(--accent); }
  .pnl-table .pnl-deduction td { color: var(--red); }
  .pnl-table .pnl-wht td { color: var(--text3); font-style: italic; }

  /* ── COST BREAKDOWN ── */
  .cost-category {
    border-bottom: 1px solid var(--border);
  }
  .cost-category:last-child { border-bottom: none; }
  .cost-cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .cost-cat-header:hover { background: var(--surface2); }
  .cost-cat-name {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text);
  }
  .cost-cat-chevron {
    color: var(--text3);
    font-size: 10px;
    transition: transform 0.2s;
  }
  .cost-cat-chevron.open { transform: rotate(90deg); }
  .cost-cat-figures {
    display: flex; gap: 24px; align-items: center;
  }
  .cost-cat-figures span {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .cost-cat-figures .label { color: var(--text3); font-size: 10px; }
  .cost-cat-body {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .cost-cat-body.open { display: block; }
  .version-notes-banner {
    padding: 8px 16px;
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
    border-bottom: 1px dashed var(--border2);
    background: rgba(200,255,78,0.04);
  }
  .cost-line {
    display: grid;
    grid-template-columns: 1fr 120px 120px 100px 80px;
    gap: 8px;
    padding: 8px 16px;
    font-size: 11px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .cost-line:last-child { border-bottom: none; }
  .cost-line .name { color: var(--text2); }
  .cost-line .amount { text-align: right; font-variant-numeric: tabular-nums; }
  .cost-line .variance.pos { color: var(--green); }
  .cost-line .variance.neg { color: var(--red); }
  .cost-line-header {
    color: var(--text3);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── PLANNING TARGETS ── */
  .planning-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px;
  }
  .planning-metric {
    display: flex; flex-direction: column; gap: 4px;
  }
  .planning-metric .pm-label {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3);
  }
  .planning-metric .pm-value {
    font-family: var(--sans); font-size: 20px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .planning-metric .pm-value.green { color: var(--green); }
  .planning-metric .pm-value.red { color: var(--red); }
  .planning-metric .pm-note { font-size: 10px; color: var(--text3); }

  .slider-row {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  .slider-label { font-size: 11px; color: var(--text2); width: 120px; flex-shrink: 0; }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .slider-value {
    font-family: var(--sans);
    font-weight: 700;
    color: var(--accent);
    width: 44px;
    text-align: right;
  }

  /* ── PAGE 2 CONTROLS ── */
  .drill-controls {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .drill-leg-name {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .version-badge {
    padding: 4px 10px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(200,255,78,0.15);
    color: var(--accent);
    border: 1px solid rgba(200,255,78,0.3);
  }
  select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  /* ── TOTALS ROW ── */
  .totals-row td {
    background: var(--surface2) !important;
    font-family: var(--sans) !important;
    font-weight: 600 !important;
    border-top: 1px solid var(--border2) !important;
  }

  /* ── ERROR ── */
  .error-banner {
    background: rgba(255,78,106,0.1);
    border: 1px solid rgba(255,78,106,0.3);
    border-radius: 6px;
    padding: 16px;
    color: var(--red);
    font-size: 12px;
    margin-bottom: 16px;
  }

  /* ── UTILITY ── */
  .mt-4 { margin-top: 4px; }
  .mt-8 { margin-top: 8px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .pending { color: var(--text3); font-style: italic; }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-logo">DDT</div>
  <div class="loader-bar"><div class="loader-bar-inner" id="loader-bar"></div></div>
  <div class="loader-text" id="loader-text">CONNECTING TO AIRTABLE</div>
</div>

<header>
  <div class="header-left">
    <div class="logo">DDT</div>
    <div class="header-divider"></div>
    <div class="header-title">DOM DOLLA TOURING — BUDGET DASHBOARD</div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showPage('overview')">Tour Overview</button>
    <button class="nav-btn" onclick="showPage('drilldown')">Leg Drill-Down</button>
  </nav>
</header>

<!-- ══════════════════════════════════════════════════════ PAGE 1 ══ -->
<div id="page-overview" class="page active">

  <div class="slider-row" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:20px;">
    <div class="slider-label">Target Margin %</div>
    <input type="range" id="target-slider" min="10" max="60" value="30" oninput="updateTargetMargin(this.value)">
    <div class="slider-value" id="target-slider-val">30%</div>
  </div>

  <div class="kpi-row" id="overview-kpis"></div>

  <div class="section-header">Tour Legs</div>
  <table class="data-table" id="overview-table">
    <thead>
      <tr>
        <th>Leg</th>
        <th class="right">Gross Fee</th>
        <th class="right">Commission</th>
        <th class="right">Allocations</th>
        <th class="right">Tour Costs</th>
        <th class="right">Net Profit</th>
        <th class="right">Margin %</th>
        <th class="right">Addl. Revenue Needed</th>
        <th class="right">Cost Saving Needed</th>
        <th class="right">WHT</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="overview-tbody"></tbody>
  </table>
</div>

<!-- ══════════════════════════════════════════════════════ PAGE 2 ══ -->
<div id="page-drilldown" class="page">

  <div class="drill-controls">
    <select id="leg-select" onchange="onLegChange()"></select>
    <select id="version-select" onchange="onVersionChange()"></select>
    <span class="version-badge" id="current-badge" style="display:none">CURRENT</span>
  </div>

  <div class="drill-leg-name" id="drill-leg-name">—</div>

  <div id="insight-banner-container"></div>

  <div class="kpi-row kpi-row-6" id="drill-kpis"></div>

  <div class="two-col">
    <!-- Revenue & Deductions -->
    <div>
      <div class="section-header">Revenue & Deductions</div>
      <div class="card">
        <table class="pnl-table" id="pnl-table"></table>
      </div>
    </div>

    <!-- Planning Targets -->
    <div>
      <div class="section-header">Planning Targets</div>
      <div class="card">
        <div class="slider-row">
          <div class="slider-label">Target Margin</div>
          <input type="range" id="drill-slider" min="10" max="60" value="30" oninput="updateDrillTarget(this.value)">
          <div class="slider-value" id="drill-slider-val">30%</div>
        </div>
        <div class="planning-grid" id="planning-grid"></div>
      </div>
    </div>
  </div>

  <!-- Cost Breakdown -->
  <div class="section-header">Cost Breakdown</div>
  <div class="card" id="cost-breakdown"></div>

</div>

<script>
let API_KEY = '';
let BASE_ID = '';

// ── State ────────────────────────────────────────────────────────────────────
let allVersions = [];      // all Budget Versions records
let tourLegs = [];         // all Tour Legs records
let flightActuals = {};    // { tourLegId: totalActual }
let targetMargin = 0.30;   // overview slider
let drillTarget = 0.30;    // drill-down slider
let selectedLegId = null;
let selectedVersion = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = (n, decimals = 0) => n == null ? '—' :
  '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
const fmtPct = (n) => n == null ? '—' : (n * 100).toFixed(1) + '%';
const fmtNum = (n) => n == null ? '—' : n.toLocaleString('en-US', { minimumFractionDigits: 0 });

function progressLoader(pct, text) {
  document.getElementById('loader-bar').style.width = pct + '%';
  if (text) document.getElementById('loader-text').textContent = text;
}

function hideLoader() {
  const el = document.getElementById('loading');
  el.classList.add('hidden');
  setTimeout(() => el.remove(), 500);
}

// ── Airtable fetch ───────────────────────────────────────────────────────────
async function fetchAll(tableId, fields = [], filterFormula = '') {
  let records = [], offset = null;
  do {
    const params = new URLSearchParams();
    fields.forEach(f => params.append('fields[]', f));
    if (filterFormula) params.set('filterByFormula', filterFormula);
    if (offset) params.set('offset', offset);
    const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${tableId}?${params}`, {
      headers: { Authorization: `Bearer ${API_KEY}` }
    });
    if (!res.ok) throw new Error(`Airtable error ${res.status}: ${await res.text()}`);
    const data = await res.json();
    records = records.concat(data.records);
    offset = data.offset;
  } while (offset);
  return records;
}

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    progressLoader(10, 'LOADING TOUR LEGS');
    const legRecs = await fetchAll('Tour%20Legs', ['Name']);
    tourLegs = legRecs.map(r => ({ id: r.id, name: r.fields['Name'] || r.id }));

    progressLoader(35, 'LOADING BUDGET VERSIONS');
    const verRecs = await fetchAll('Budget%20Versions', [
      'Name','Version','Is Current?','Version Date','Version Notes',
      'Tour Leg',
      'Gross Fee (USD)','Commission %','Marketing Alloc %','Salary Alloc %','Ops Alloc %',
      'Flights Budget','Hotels Budget','Wages Budget','Production Budget','Misc Budget',
      'Flights Notes','Hotels Notes','Wages Notes','Production Notes','Misc Notes',
      'WHT (USD)','Target Margin %',
      'Flights Actual (USD)','Hotels Actual (USD)'
    ]);
    allVersions = verRecs.map(r => ({ id: r.id, ...r.fields }));

    progressLoader(70, 'COMPUTING ACTUALS');
    // Build flight actuals map by tour leg
    allVersions.forEach(v => {
      const legIds = v['Tour Leg'] || [];
      const actual = v['Flights Actual (USD)'] || 0;
      legIds.forEach(lid => {
        flightActuals[lid] = (flightActuals[lid] || 0) + actual;
      });
    });

    progressLoader(100, 'READY');
    await new Promise(r => setTimeout(r, 300));
    hideLoader();
    buildOverview();
    buildDrillControls();
  } catch (e) {
    document.getElementById('loading').classList.add('hidden');
    document.querySelector('#page-overview').insertAdjacentHTML('afterbegin',
      `<div class="error-banner">⚠ Failed to load data: ${e.message}</div>`);
    console.error(e);
  }
}

// ── Compute derived fields ────────────────────────────────────────────────────
function compute(v, overrideTarget = null) {
  const gross = v['Gross Fee (USD)'] || 0;
  const commPct = v['Commission %'] || 0.10;
  const mktPct = v['Marketing Alloc %'] || 0.05;
  const salPct = v['Salary Alloc %'] || 0.05;
  const opsPct = v['Ops Alloc %'] || 0.042;
  const totalAllocPct = mktPct + salPct + opsPct;
  const flights = v['Flights Budget'] || 0;
  const hotels = v['Hotels Budget'] || 0;
  const wages = v['Wages Budget'] || 0;
  const production = v['Production Budget'] || 0;
  const misc = v['Misc Budget'] || 0;
  const wht = v['WHT (USD)'] || 0;
  const tgt = overrideTarget != null ? overrideTarget : (v['Target Margin %'] || 0.30);

  const commission = gross * commPct;
  const totalAlloc = gross * totalAllocPct;
  const tourCosts = flights + hotels + wages + production + misc;
  const netProfit = gross - commission - totalAlloc - tourCosts;
  const marginPct = gross > 0 ? netProfit / gross : 0;
  const targetNetProfit = gross * tgt;
  const profitGap = targetNetProfit - netProfit;
  const denominator = 1 - commPct - totalAllocPct - tgt;
  const additionalRevenue = profitGap > 0 && denominator !== 0 ? profitGap / denominator : 0;
  const costSaving = profitGap > 0 ? profitGap : 0;

  const flightsActual = v['Flights Actual (USD)'] || 0;
  const hotelsActual = v['Hotels Actual (USD)'] || 0;
  const flightsVariance = flights - flightsActual;
  const hotelsVariance = hotels - hotelsActual;

  return {
    gross, commPct, commission, mktPct, salPct, opsPct, totalAllocPct, totalAlloc,
    flights, hotels, wages, production, misc, wht, tourCosts,
    netProfit, marginPct, targetNetProfit, profitGap,
    additionalRevenue, costSaving, tgt,
    flightsActual, hotelsActual, flightsVariance, hotelsVariance
  };
}

function statusPill(marginPct, tgt) {
  if (marginPct >= tgt) return '<span class="pill green">On Target</span>';
  if (marginPct >= tgt - 0.05) return '<span class="pill amber">Below Target</span>';
  return '<span class="pill red">Significantly Below</span>';
}

// ── PAGE 1: Overview ─────────────────────────────────────────────────────────
function buildOverview() {
  // Get current version per leg
  const currentVersions = allVersions.filter(v => v['Is Current?']);

  let totalGross = 0, totalCosts = 0, totalNet = 0;

  const rows = currentVersions.map(v => {
    const c = compute(v, targetMargin);
    totalGross += c.gross;
    totalCosts += c.tourCosts;
    totalNet += c.netProfit;

    const legIds = v['Tour Leg'] || [];
    const legName = legIds.length > 0
      ? (tourLegs.find(l => l.id === legIds[0])?.name || v['Name'])
      : (v['Name'] || '—');

    return { v, c, legName, legIds };
  });

  // KPIs
  const blended = totalGross > 0 ? totalNet / totalGross : 0;
  const kpiColor = blended >= targetMargin ? 'green' : blended >= targetMargin - 0.05 ? 'amber' : 'red';
  document.getElementById('overview-kpis').innerHTML = `
    <div class="kpi-card accent">
      <div class="kpi-label">Total Gross Fees</div>
      <div class="kpi-value">${fmt(totalGross)}</div>
      <div class="kpi-sub">${currentVersions.length} leg${currentVersions.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Tour Costs</div>
      <div class="kpi-value">${fmt(totalCosts)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Net Profit</div>
      <div class="kpi-value">${fmt(totalNet)}</div>
    </div>
    <div class="kpi-card ${kpiColor}">
      <div class="kpi-label">Blended Margin %</div>
      <div class="kpi-value ${kpiColor}">${fmtPct(blended)}</div>
      <div class="kpi-sub">Target: ${fmtPct(targetMargin)}</div>
    </div>
  `;

  // Table
  document.getElementById('overview-tbody').innerHTML = rows.map(({ v, c, legName, legIds }) => {
    const legId = legIds[0] || null;
    return `<tr>
      <td>${legName}</td>
      <td class="right">${fmt(c.gross)}</td>
      <td class="right">${fmt(c.commission)}</td>
      <td class="right">${fmt(c.totalAlloc)}</td>
      <td class="right">${fmt(c.tourCosts)}</td>
      <td class="right">${fmt(c.netProfit)}</td>
      <td class="right">${fmtPct(c.marginPct)}</td>
      <td class="right">${c.additionalRevenue > 0 ? fmt(c.additionalRevenue) : '<span class="pill green" style="font-size:10px">—</span>'}</td>
      <td class="right">${c.costSaving > 0 ? fmt(c.costSaving) : '<span class="pill green" style="font-size:10px">—</span>'}</td>
      <td class="right">${c.wht > 0 ? fmt(c.wht) : '<span class="pending">—</span>'}</td>
      <td>${statusPill(c.marginPct, targetMargin)}</td>
      <td><button class="nav-btn" style="padding:4px 10px;font-size:10px" onclick="drillTo('${legId}')">→ Drill</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="12" style="color:var(--text3);text-align:center;padding:24px">No current budget versions found</td></tr>';
}

function updateTargetMargin(val) {
  targetMargin = val / 100;
  document.getElementById('target-slider-val').textContent = val + '%';
  buildOverview();
}

// ── PAGE 2: Drill-Down ────────────────────────────────────────────────────────
function buildDrillControls() {
  // Populate leg selector with unique legs that have versions
  const legSelect = document.getElementById('leg-select');
  const legsWithVersions = [];
  const seen = new Set();

  allVersions.forEach(v => {
    const legIds = v['Tour Leg'] || [];
    legIds.forEach(lid => {
      if (!seen.has(lid)) {
        seen.add(lid);
        const leg = tourLegs.find(l => l.id === lid);
        legsWithVersions.push({ id: lid, name: leg?.name || lid });
      }
    });
  });

  legSelect.innerHTML = legsWithVersions.map(l =>
    `<option value="${l.id}">${l.name}</option>`
  ).join('');

  if (legsWithVersions.length > 0) {
    selectedLegId = legsWithVersions[0].id;
    buildVersionSelect(selectedLegId);
    buildDrillDown();
  }
}

function buildVersionSelect(legId) {
  const versions = allVersions.filter(v => (v['Tour Leg'] || []).includes(legId));
  versions.sort((a, b) => {
    const order = { 'Current': 0, 'V3': 1, 'V2': 2, 'V1': 3 };
    return (order[a['Version']] ?? 99) - (order[b['Version']] ?? 99);
  });

  const verSelect = document.getElementById('version-select');
  verSelect.innerHTML = versions.map(v =>
    `<option value="${v.id}">${v['Version'] || 'Unknown'}</option>`
  ).join('');

  // Default to current
  const currentVer = versions.find(v => v['Is Current?']);
  if (currentVer) {
    verSelect.value = currentVer.id;
    selectedVersion = currentVer;
  } else if (versions.length > 0) {
    selectedVersion = versions[0];
  }
}

function onLegChange() {
  selectedLegId = document.getElementById('leg-select').value;
  buildVersionSelect(selectedLegId);
  buildDrillDown();
}

function onVersionChange() {
  const vid = document.getElementById('version-select').value;
  selectedVersion = allVersions.find(v => v.id === vid);
  buildDrillDown();
}

function drillTo(legId) {
  if (!legId || legId === 'null') return;
  showPage('drilldown');
  document.getElementById('leg-select').value = legId;
  selectedLegId = legId;
  buildVersionSelect(legId);
  buildDrillDown();
}

function updateDrillTarget(val) {
  drillTarget = val / 100;
  document.getElementById('drill-slider-val').textContent = val + '%';
  buildDrillDown();
}

function buildDrillDown() {
  if (!selectedVersion) return;
  const v = selectedVersion;
  const c = compute(v, drillTarget);

  // Leg name
  const legIds = v['Tour Leg'] || [];
  const leg = legIds.length > 0 ? tourLegs.find(l => l.id === legIds[0]) : null;
  const legName = leg?.name || v['Name'] || '—';
  document.getElementById('drill-leg-name').textContent = legName;

  // Current badge
  const badge = document.getElementById('current-badge');
  badge.style.display = v['Is Current?'] ? 'inline-flex' : 'none';

  // ── Insight banner
  let insightClass = 'on-target', insightText = '';
  if (c.marginPct >= drillTarget) {
    insightClass = 'on-target';
    const surplus = c.netProfit - c.targetNetProfit;
    insightText = `<strong>${legName}</strong> is on target at <strong>${fmtPct(c.marginPct)}</strong> margin — ${fmtPct(drillTarget)} target met with <strong>${fmt(surplus)}</strong> to spare.`;
  } else {
    const gap = drillTarget - c.marginPct;
    if (gap < 0.05) insightClass = 'below';
    else insightClass = 'significantly-below';
    insightText = `<strong>${legName}</strong> is ${fmtPct(gap)} below the ${fmtPct(drillTarget)} target. Needs either <strong>${fmt(c.additionalRevenue)}</strong> in additional fees or <strong>${fmt(c.costSaving)}</strong> in tour cost reductions.`;
  }
  document.getElementById('insight-banner-container').innerHTML =
    `<div class="insight-banner ${insightClass}">${insightText}</div>`;

  // ── KPI cards
  const atTarget = c.marginPct >= drillTarget;
  document.getElementById('drill-kpis').innerHTML = `
    <div class="kpi-card accent">
      <div class="kpi-label">Gross Fee</div>
      <div class="kpi-value">${fmt(c.gross)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Tour Costs</div>
      <div class="kpi-value">${fmt(c.tourCosts)}</div>
    </div>
    <div class="kpi-card ${atTarget ? 'green' : 'red'}">
      <div class="kpi-label">Net Profit</div>
      <div class="kpi-value ${atTarget ? 'green' : 'red'}">${fmt(c.netProfit)}</div>
    </div>
    <div class="kpi-card ${atTarget ? 'green' : 'red'}">
      <div class="kpi-label">Margin %</div>
      <div class="kpi-value ${atTarget ? 'green' : 'red'}">${fmtPct(c.marginPct)}</div>
    </div>
    <div class="kpi-card ${atTarget ? 'green' : ''}">
      <div class="kpi-label">Addl. Revenue for Target</div>
      <div class="kpi-value ${atTarget ? 'green' : ''}">${atTarget ? '—' : fmt(c.additionalRevenue)}</div>
      <div class="kpi-sub">${atTarget ? 'On target' : 'Additional fees needed'}</div>
    </div>
    <div class="kpi-card ${atTarget ? 'green' : ''}">
      <div class="kpi-label">Cost Saving for Target</div>
      <div class="kpi-value ${atTarget ? 'green' : ''}">${atTarget ? '—' : fmt(c.costSaving)}</div>
      <div class="kpi-sub">${atTarget ? 'On target' : 'Cost reduction needed'}</div>
    </div>
  `;

  // ── P&L waterfall
  document.getElementById('pnl-table').innerHTML = `
    <tr>
      <td class="pnl-label">Gross Fee</td>
      <td class="pnl-pct">—</td>
      <td class="pnl-amount">${fmt(c.gross)}</td>
    </tr>
    <tr class="pnl-deduction">
      <td class="pnl-label">Commission (Wasserman)</td>
      <td class="pnl-pct">${fmtPct(c.commPct)}</td>
      <td class="pnl-amount">(${fmt(c.commission)})</td>
    </tr>
    <tr class="pnl-deduction">
      <td class="pnl-label">Allocations (subtotal)</td>
      <td class="pnl-pct">${fmtPct(c.totalAllocPct)}</td>
      <td class="pnl-amount">(${fmt(c.totalAlloc)})</td>
    </tr>
    <tr>
      <td class="pnl-indent">— Marketing</td>
      <td class="pnl-pct">${fmtPct(c.mktPct)}</td>
      <td class="pnl-amount">${fmt(c.gross * c.mktPct)}</td>
    </tr>
    <tr>
      <td class="pnl-indent">— Salary (off-road)</td>
      <td class="pnl-pct">${fmtPct(c.salPct)}</td>
      <td class="pnl-amount">${fmt(c.gross * c.salPct)}</td>
    </tr>
    <tr>
      <td class="pnl-indent">— Ops</td>
      <td class="pnl-pct">${fmtPct(c.opsPct)}</td>
      <td class="pnl-amount">${fmt(c.gross * c.opsPct)}</td>
    </tr>
    <tr class="pnl-deduction">
      <td class="pnl-label">Tour Costs</td>
      <td class="pnl-pct">—</td>
      <td class="pnl-amount">(${fmt(c.tourCosts)})</td>
    </tr>
    <tr class="pnl-total">
      <td class="pnl-label pnl-total">Net Profit</td>
      <td class="pnl-pct">${fmtPct(c.marginPct)}</td>
      <td class="pnl-amount">${fmt(c.netProfit)}</td>
    </tr>
    ${c.wht > 0 ? `
    <tr class="pnl-wht">
      <td class="pnl-label">WHT (ex-line)</td>
      <td class="pnl-pct">—</td>
      <td class="pnl-amount">(${fmt(c.wht)})</td>
    </tr>
    <tr class="pnl-total">
      <td class="pnl-label pnl-total">Net Profit After WHT</td>
      <td class="pnl-pct">—</td>
      <td class="pnl-amount">${fmt(c.netProfit - c.wht)}</td>
    </tr>` : ''}
  `;

  // ── Planning targets
  const pmColor = atTarget ? 'green' : 'red';
  document.getElementById('planning-grid').innerHTML = `
    <div class="planning-metric">
      <div class="pm-label">Target Margin</div>
      <div class="pm-value" style="color:var(--accent)">${fmtPct(drillTarget)}</div>
    </div>
    <div class="planning-metric">
      <div class="pm-label">Target Net Profit</div>
      <div class="pm-value" style="color:var(--accent)">${fmt(c.targetNetProfit)}</div>
    </div>
    <div class="planning-metric">
      <div class="pm-label">Gap to Target</div>
      <div class="pm-value ${pmColor}">${c.profitGap > 0 ? fmt(c.profitGap) : '—'}</div>
      <div class="pm-note">${atTarget ? 'On target ✓' : 'Positive = below target'}</div>
    </div>
    <div class="planning-metric">
      <div class="pm-label">Addl. Revenue Needed</div>
      <div class="pm-value ${pmColor}">${atTarget ? '—' : fmt(c.additionalRevenue)}</div>
      <div class="pm-note">Accounts for commission & alloc on new revenue</div>
    </div>
    <div class="planning-metric">
      <div class="pm-label">Cost Saving Needed</div>
      <div class="pm-value ${pmColor}">${atTarget ? '—' : fmt(c.costSaving)}</div>
      <div class="pm-note">Holding revenue constant</div>
    </div>
    <div class="planning-metric">
      <div class="pm-label">At Target?</div>
      <div class="pm-value ${pmColor}">${atTarget ? 'Yes ✓' : 'No'}</div>
    </div>
  `;

  // ── Cost breakdown
  const categories = [
    {
      key: 'Flights',
      budget: c.flights,
      actual: c.flightsActual,
      variance: c.flightsVariance,
      notes: v['Flights Notes'],
      hasActuals: true,
      lines: [
        { name: 'Artist Flights (T-A-F-999)', budget: null, actual: null },
        { name: 'Management Flights (T-M-F-xxx)', budget: null, actual: null },
        { name: 'Production Flights (T-P-F-xxx)', budget: null, actual: null },
        { name: 'Crew Flights (T-G-F-xxx)', budget: null, actual: null },
      ]
    },
    {
      key: 'Hotels',
      budget: c.hotels,
      actual: c.hotelsActual || null,
      variance: c.hotelsVariance,
      notes: v['Hotels Notes'],
      hasActuals: false,
      lines: [
        { name: 'Artist Hotels (T-A-H-xxx)', budget: null, actual: null },
        { name: 'Management Hotels (T-M-H-xxx)', budget: null, actual: null },
        { name: 'Crew Hotels (T-G-H-xxx)', budget: null, actual: null },
      ]
    },
    {
      key: 'Wages',
      budget: c.wages,
      actual: null,
      variance: null,
      notes: v['Wages Notes'],
      hasActuals: false,
      lines: [
        { name: 'On-road Day Rates', budget: null, actual: null },
        { name: 'Per Diem', budget: null, actual: null },
      ]
    },
    {
      key: 'Production',
      budget: c.production,
      actual: null,
      variance: null,
      notes: v['Production Notes'],
      hasActuals: false,
      lines: [
        { name: 'Equipment & Freight (T-P-E-xxx)', budget: null, actual: null },
        { name: 'Other Production (T-P-O-xxx)', budget: null, actual: null },
      ]
    },
    {
      key: 'Misc',
      budget: c.misc,
      actual: null,
      variance: null,
      notes: v['Misc Notes'],
      hasActuals: false,
      lines: [
        { name: 'Ground Transport', budget: null, actual: null },
        { name: 'Visa & Travel Docs', budget: null, actual: null },
        { name: 'Recharges & Sundry', budget: null, actual: null },
      ]
    },
  ];

  document.getElementById('cost-breakdown').innerHTML = categories.map((cat, i) => {
    const varClass = cat.variance != null ? (cat.variance >= 0 ? 'pos' : 'neg') : '';
    const varText = cat.variance != null ? `${cat.variance >= 0 ? '+' : ''}${fmt(cat.variance)}` : '—';

    const lines = cat.lines.map(l => `
      <div class="cost-line">
        <span class="name">${l.name}</span>
        <span class="amount">${l.budget != null ? fmt(l.budget) : '<span class="pending">TBC</span>'}</span>
        <span class="amount">${l.actual != null ? fmt(l.actual) : '<span class="pending">—</span>'}</span>
        <span class="amount variance ${l.variance != null ? (l.variance >= 0 ? 'pos' : 'neg') : ''}">—</span>
        <span>${l.budget ? statusPill(0, 1) : '<span class="pill gray">Pending</span>'}</span>
      </div>
    `).join('');

    return `
      <div class="cost-category">
        <div class="cost-cat-header" onclick="toggleCat(${i})">
          <div class="cost-cat-name">
            <span class="cost-cat-chevron" id="chev-${i}">▶</span>
            <span>${cat.key}</span>
            ${!cat.hasActuals ? '<span class="pill gray" style="font-size:9px">Actuals pending</span>' : ''}

          <div class="cost-cat-figures">
            <div><div class="label">BUDGET</div><span>${fmt(cat.budget)}</span></div>
            <div><div class="label">ACTUAL</div><span>${cat.actual != null ? fmt(cat.actual) : '<span class="pending">—</span>'}</span></div>
            <div><div class="label">VARIANCE</div><span class="variance ${varClass}">${varText}</span></div>
            ${statusPill(cat.variance != null && cat.variance >= 0 ? 1 : cat.variance != null ? 0 : -1, 0.5)}
          </div>
        </div>
        <div class="cost-cat-body" id="cat-body-${i}">
          ${cat.notes ? `<div class="version-notes-banner">📋 Version notes: ${cat.notes}</div>` : ''}
          <div class="cost-line cost-line-header">
            <span>Account / Description</span>
            <span style="text-align:right">Budget</span>
            <span style="text-align:right">Actual</span>
            <span style="text-align:right">Variance</span>
            <span>Status</span>
          </div>
          ${lines}
        </div>
      </div>
    `;
  }).join('') + `
    <div style="padding:14px 16px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;background:var(--surface2)">
      <span style="font-family:var(--sans);font-weight:600">Tour Costs Total</span>
      <span style="font-family:var(--sans);font-weight:700;color:var(--accent)">${fmt(c.tourCosts)}</span>
    </div>
    ${c.wht > 0 ? `<div style="padding:10px 16px;display:flex;justify-content:space-between;color:var(--text3);font-style:italic;font-size:11px">
      <span>WHT (ex-line)</span><span>(${fmt(c.wht)})</span>
    </div>` : ''}
  `;
}

function toggleCat(i) {
  const body = document.getElementById(`cat-body-${i}`);
  const chev = document.getElementById(`chev-${i}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

// ── Page switching ────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  event?.target?.classList.add('active');
  if (name === 'overview') document.querySelectorAll('.nav-btn')[0].classList.add('active');
  else document.querySelectorAll('.nav-btn')[1].classList.add('active');
}

// ── Auth gate ─────────────────────────────────────────────────────────────────
function showAuthGate() {
  document.getElementById('loading').innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:32px;width:420px;max-width:90vw">
      <div class="loader-logo" style="margin-bottom:4px">DDT</div>
      <div style="color:var(--text3);font-size:11px;letter-spacing:0.08em;margin-bottom:24px">DOM DOLLA TOURING — BUDGET DASHBOARD</div>

      <div style="margin-bottom:16px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Airtable Personal Access Token</div>
        <input id="input-key" type="password" placeholder="pat..." style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;border-radius:4px;outline:none;">
      </div>

      <div style="margin-bottom:24px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Base ID</div>
        <input id="input-base" type="text" placeholder="appXXXXXXXXXXXXXX" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;border-radius:4px;outline:none;">
      </div>

      <div id="auth-error" style="color:var(--red);font-size:11px;margin-bottom:12px;display:none"></div>

      <button onclick="submitAuth()" style="width:100%;background:var(--accent);color:#0a0a0f;font-family:var(--sans);font-weight:700;font-size:13px;padding:12px;border:none;border-radius:4px;cursor:pointer;letter-spacing:0.04em;">Connect →</button>

      <div style="margin-top:16px;font-size:10px;color:var(--text3);line-height:1.6">
        Your credentials are used in-memory only and never stored or transmitted anywhere except directly to Airtable's API.
      </div>
    </div>
  `;
}

async function submitAuth() {
  const key = document.getElementById('input-key').value.trim();
  const base = document.getElementById('input-base').value.trim();
  const errEl = document.getElementById('auth-error');

  if (!key || !base) {
    errEl.textContent = 'Both fields are required.';
    errEl.style.display = 'block';
    return;
  }

  API_KEY = key;
  BASE_ID = base;

  document.getElementById('loading').innerHTML = `
    <div class="loader-logo">DDT</div>
    <div class="loader-bar"><div class="loader-bar-inner" id="loader-bar" style="width:0%"></div></div>
    <div class="loader-text" id="loader-text">CONNECTING TO AIRTABLE</div>
  `;

  await loadData();
}

// ── Init ──────────────────────────────────────────────────────────────────────
showAuthGate();
